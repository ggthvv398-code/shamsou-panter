<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
    text-align: center;
}

/* Splash */
#splash {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    animation: fadeOut 1s ease forwards;
    animation-delay: 2.5s;
}

#splash img {
    width: 120px;
    border-radius: 50%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: zoom 1.5s ease;
}

@keyframes zoom {
    0% {transform: scale(0.5); opacity: 0;}
    100% {transform: scale(1); opacity: 1;}
}

@keyframes fadeOut {
    to {opacity: 0; visibility: hidden;}
}

/* Header */
header {
    background: linear-gradient(135deg, #2563eb, #0ea5e9);
    padding: 40px 20px;
    color: white;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: white;
    padding: 8px;
    object-fit: cover;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

header h1 {
    margin: 10px 0 5px;
}

header p {
    opacity: 0.9;
}

/* Buttons */
.btn {
    padding: 14px 25px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin: 10px;
    font-size: 15px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.btn:hover {
    transform: translateY(-3px);
}

/* Boxes */
.box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin: 20px auto;
    max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

.info, .gallery, .location {
    display: none;
}

/* Gallery */
.gallery img {
    width: 90%;
    max-width: 300px;
    margin: 10px;
    border-radius: 12px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

footer {
    margin: 20px;
    color: #555;
}
</style>
